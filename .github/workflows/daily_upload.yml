name: YouTube Upload 6x Daily

on:
  schedule:
    # Peak engagement hours for global motivational audience (UTC)
    # 5am, 8am, 12pm, 4pm, 7pm, 10pm UTC
    # = 7am, 10am, 2pm, 6pm, 9pm, 12am Swedish time
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu-extra fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write credentials from secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          printf '%s' "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          cat > .env <<EOF
          GROQ_API_KEY=$GROQ_API_KEY
          YOUTUBE_CLIENT_SECRETS_PATH=client_secrets.json
          YOUTUBE_TOKEN_PATH=token.json
          CHANNEL_NICHE=motivational and inspirational
          NUM_SCENES=8
          UPLOAD_PRIVACY=public
          TTS_VOICE=en-US-GuyNeural
          MUSIC_VOLUME=0.18
          EOF

      - name: Run pipeline
        run: python main.py
